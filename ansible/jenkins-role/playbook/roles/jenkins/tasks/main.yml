# Install Jenkins
---
  - name: yum update
    yum:
      name: '*'
      state: latest
      use_backend: "dnf5"

  - name: add the jenkins repo
    get_url:
      url: https://pkg.jenkins.io/rpm-stable/jenkins.repo
      dest: /etc/yum.repos.d/jenkins.repo 

  - name: import a key file from jenkins-ci
    ansible.builtin.rpm_key:
      state: present
      key: https://pkg.jenkins.io/rpm-stable/jenkins.io-2026.key

  - name: yum update
    yum:
      name: '*'
      state: latest

  - name: install java
    shell: |
      sudo yum install java-21-amazon-corretto -y

  - name: install jenkins
    yum:
      name: jenkins
      state: latest

  - name: start jenkins
    ansible.builtin.systemd:
      enabled: true
      name: jenkins
      state: started